# UmairStudio — Netlify deploy config
# The site is plain static files; Netlify serves them as-is.

[build]
  publish = "."

# Cache the big ffmpeg/font files hard (they never change per version).
# COEP on these too: worker scripts loaded from an isolated page must
# themselves carry a compatible COEP header, or the browser refuses to
# start the worker (silent hang).
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Cross-Origin-Embedder-Policy = "credentialless"

[[headers]]
  for = "/vendor-mt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Cross-Origin-Embedder-Policy = "credentialless"

# Cross-origin isolation on the Shortify page only -> SharedArrayBuffer ->
# MULTI-THREADED ffmpeg (much faster renders). COEP "credentialless" (not
# require-corp) so CDN/gtag/firebase subresources keep loading; browsers
# without credentialless support (Safari) simply fall back to single-thread.
# Google-login POPUPS break under COOP same-origin, so sign-in lives on
# /login/ (no headers there) and Shortify just reads the shared auth state.
[[headers]]
  for = "/shortify/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
