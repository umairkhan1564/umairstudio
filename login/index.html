<!doctype html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EG393DZYJ8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-EG393DZYJ8');
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — ClipCut Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
<style>
  :root{--bg:#faf9ff;--card:#ffffff;--line:rgba(25,18,51,.18);--fg:#1b1433;--mut:#6b6486;--accent:#7c3aed;--accent2:#a855f7;--cta:#7c3aed;--cta2:#a855f7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:'Segoe UI',system-ui,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:20px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:40px 36px;max-width:400px;width:100%;text-align:center}
  .mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:26px;margin:0 auto 18px}
  h1{font-size:22px;margin-bottom:8px}
  p{color:var(--mut);font-size:14.5px;margin-bottom:26px}
  .g{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:11px;border:0;cursor:pointer;background:linear-gradient(135deg,var(--cta),var(--cta2));color:#fff;font-weight:700;font-size:15.5px}
  .g:hover{filter:brightness(1.1)} .g:disabled{opacity:.6}
  .st{margin-top:16px;font-size:13.5px;color:var(--mut);min-height:20px}
  .back{display:inline-block;margin-top:18px;color:var(--mut);font-size:13.5px;text-decoration:none}
  .back:hover{color:var(--fg)}
</style>
</head>
<body>
<div class="box">
  <div class="mark">✂️</div>
  <h1>Sign in to ClipCut Studio</h1>
  <p>One click with Google — free. Your videos still never leave your device.</p>
  <button class="g" id="go">Continue with Google</button>
  <div class="st" id="st"></div>
  <a class="back" href="/">← Back to home</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBwIMwmqzPV-05sQxXyo4oJnXJV5ROh6ww",
  authDomain: "umairstudio.firebaseapp.com",
  projectId: "umairstudio",
  storageBucket: "umairstudio.firebasestorage.app",
  messagingSenderId: "663358190480",
  appId: "1:663358190480:web:7bec30086457d793b73915"
});
// where to go after sign-in — only allow same-site paths
var next = new URLSearchParams(location.search).get('next') || '/shortify/';
if (!/^\/[A-Za-z0-9_\-\/]*$/.test(next)) next = '/shortify/';

var btn = document.getElementById('go'), st = document.getElementById('st');
firebase.auth().onAuthStateChanged(function(u){
  if (u) { st.textContent = 'Signed in — taking you back…'; location.replace(next); }
});
btn.onclick = function(){
  btn.disabled = true; st.textContent = 'Opening Google sign-in…';
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(function(e){
      btn.disabled = false;
      st.textContent = (e && e.code === 'auth/popup-closed-by-user') ? '' : ('Sign-in failed: ' + (e.message || e));
    });
};
</script>
</body>
</html>
